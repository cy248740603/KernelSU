name: 编译 K40S (munch) KernelSU Android14-4.19
on:
  workflow_dispatch:  # 手动点击运行

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y git build-essential clang llvm lld bison flex libssl-dev libelf-dev gcc-aarch64-linux-gnu

      # 🔧 修复：换用 K40S/munch 专属可用内核仓库（Android14-4.19 分支）
      - name: 克隆 K40S 4.19 内核源码
        uses: actions/checkout@v6
        with:
          repository: danya2271/xiaomi_kernel_munch
          ref: android-14-4.19
          path: device_kernel

      # 准备内核编译环境（修正 defconfig 名称）
      - name: 准备内核环境
        run: |
          cd device_kernel
          export ARCH=arm64
          make munch_defconfig
          make modules_prepare -j$(nproc)

      # 克隆官方 KernelSU
      - name: 克隆 KernelSU 官方源码
        uses: actions/checkout@v6
        with:
          repository: tiann/KernelSU
          path: KernelSU

      # 编译 4.19 专属 kernelsu.ko（修正路径与参数）
      - name: 开始编译 KernelSU
        run: |
          cd KernelSU/kernel
          export ARCH=arm64
          make -C $GITHUB_WORKSPACE/device_kernel \
            M=$(pwd) \
            CONFIG_KSU=m \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc)
          
          # 模块瘦身（减小体积，兼容设备）
          llvm-strip -d kernelsu.ko

      # 上传编译好的文件
      - name: 上传 kernelsu.ko
        uses: actions/upload-artifact@v7
        with:
          name: kernelsu-k40s-android14-4.19
          path: KernelSU/kernel/kernelsu.ko
